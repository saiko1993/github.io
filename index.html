<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>saiko1993 – git log</title>
  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      margin: 0;
      padding: 2rem;
    }
    h1 {
      color: #58a6ff;
      font-size: 1.4rem;
      margin-bottom: 0.25rem;
    }
    .prompt {
      color: #8b949e;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .prompt span {
      color: #3fb950;
    }
    .log {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .log li {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      padding: 0.3rem 0;
      border-bottom: 1px solid #21262d;
      font-size: 0.9rem;
    }
    .log li:last-child {
      border-bottom: none;
    }
    .sha {
      color: #d2a8ff;
      min-width: 7ch;
    }
    .message {
      color: #c9d1d9;
    }
    .footer {
      margin-top: 2rem;
      color: #8b949e;
      font-size: 0.8rem;
    }
    a {
      color: #58a6ff;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>saiko1993.github.io</h1>
  <p class="prompt"><span>$</span> git log --oneline</p>

  <ul class="log" id="log">
    <li><span class="sha">1c83323</span><span class="message">Delete README.md</span></li>
  </ul>

  <div class="footer">
    <a href="https://github.com/saiko1993/github.io">github.com/saiko1993/github.io</a>
  </div>
</body>
</html>
